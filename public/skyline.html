<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skyline Runner 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HUD Top */
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            color: #fff;
            font-size: 24px;
        }

        .score-box div { margin-bottom: 5px; }
        .score-label { font-size: 14px; color: #aaa; }
        .score-val { color: #0ff; font-weight: 900; }

        /* HUD Bottom */
        .hud-bottom {
            padding: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        /* Boost Meter */
        .boost-container {
            width: 300px;
        }
        .boost-label { color: #fff; font-size: 14px; margin-bottom: 5px; text-shadow: 0 0 5px #f0f; }
        .boost-bar-bg {
            width: 100%;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 4px;
            overflow: hidden;
        }
        .boost-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff00de, #00ffff);
            transition: width 0.1s linear;
        }
        .boost-ready { animation: pulse 0.5s infinite alternate; }

        @keyframes pulse { from { box-shadow: 0 0 5px #0ff; } to { box-shadow: 0 0 20px #0ff; } }

        /* Overlay Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        
        .hidden { opacity: 0; pointer-events: none; }

        h1 {
            font-size: 60px;
            color: #fff;
            text-transform: uppercase;
            margin: 0 0 20px 0;
            background: linear-gradient(to bottom, #00ffff, #ff00de);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0, 255, 255, 0.5);
            letter-spacing: 5px;
            text-align: center;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            transform: scale(1.1);
        }

        .instructions {
            color: #ccc;
            margin-top: 30px;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
        }
        .key { color: #0ff; font-weight: bold; border: 1px solid #0ff; padding: 2px 6px; border-radius: 4px; }
        
        /* Combo Text Popups */
        .popup {
            position: absolute;
            color: #ff0;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* Powerup Status */
        .active-powerups {
            display: flex;
            gap: 10px;
        }
        .powerup-badge {
            padding: 5px 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #fff;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-val" id="scoreEl">0</div>
            </div>
            <div class="score-box" style="text-align: center">
                <div class="score-label">DISTANCE</div>
                <div class="score-val" id="distEl">0m</div>
            </div>
            <div class="score-box" style="text-align: right">
                <div class="score-label">COINS</div>
                <div class="score-val" id="coinEl">0</div>
            </div>
        </div>

        <div class="hud-bottom">
            <div class="boost-container">
                <div class="boost-label">BOOST [SPACE]</div>
                <div class="boost-bar-bg">
                    <div class="boost-bar-fill" id="boostBar"></div>
                </div>
            </div>
            <div class="active-powerups" id="powerupContainer">
                <!-- Powerups injected here -->
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="screen">
        <h1>SKYLINE RUNNER</h1>
        <button class="btn" onclick="startGame()">Launch</button>
        <div class="instructions">
            <p>Use <span class="key">ARROWS</span> or <span class="key">WASD</span> to fly.</p>
            <p>Hold <span class="key">SPACE</span> to BOOST (Invulnerable while boosting).</p>
            <p>Avoid buildings. Collect coins.</p>
            <p>Look out for Wind Zones and Powerups!</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen hidden">
        <h1 style="color: #ff0055; background: none; -webkit-text-fill-color: #ff0055; text-shadow: 0 0 20px #ff0000;">CRASHED</h1>
        <h2 style="color: #fff; margin-top:0">FINAL SCORE: <span id="finalScore" style="color:#0ff">0</span></h2>
        <button class="btn" onclick="resetGame()">RETRY [R]</button>
    </div>

<script>
/**
 * SKYLINE RUNNER - Single File 3D Game
 * Author: Gemini
 */

// --- Constants & Config ---
const CONFIG = {
    fov: 400,            // Field of view (focal length)
    renderDist: 3000,    // How far we can see
    segmentLength: 100,  // Distance between building rows
    roadWidth: 2000,     // Playable width
    baseSpeed: 15,       // Initial speed
    maxSpeed: 40,        // Max normal speed
    boostSpeed: 80,      // Speed while boosting
    laneCount: 7,        // Number of virtual lanes for generation
    colors: {
        skyDay: ['#4fc3f7', '#0288d1'],
        skyNight: ['#0f0c29', '#302b63'],
        fogDay: '#ffffff',
        fogNight: '#000000'
    }
};

// --- Game State ---
const state = {
    playing: false,
    gameOver: false,
    paused: false,
    score: 0,
    distance: 0,
    coins: 0,
    speed: 0,
    targetSpeed: CONFIG.baseSpeed,
    time: 0,
    dayCycle: 0, // 0 to 1
    boostEnergy: 100,
    boosting: false,
    combo: 0,
    comboTimer: 0,
    wind: 0, // Wind force x
    shake: 0,
    gameTime: 0
};

// --- Input Handling ---
const input = {
    left: false,
    right: false,
    up: false,
    down: false,
    boost: false
};

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = true;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = true;
    if (e.key === ' ' && !e.repeat) input.boost = true;
    if (e.key === 'r' || e.key === 'R') {
        if (state.gameOver) resetGame();
    }
});

window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = false;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = false;
    if (e.key === ' ') input.boost = false;
});

// --- Audio System (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const Sound = {
    playTone: (freq, type, duration, vol = 0.1) => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    },
    coin: () => Sound.playTone(1200, 'sine', 0.1, 0.1),
    boost: () => {
        // Noise buffer for boost
        const bufferSize = audioCtx.sampleRate * 0.2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.value = 0.05;
        noise.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
    },
    crash: () => {
        Sound.playTone(100, 'sawtooth', 0.5, 0.3);
        Sound.playTone(50, 'square', 0.5, 0.3);
    },
    powerup: () => {
        Sound.playTone(400, 'sine', 0.1);
        setTimeout(() => Sound.playTone(600, 'sine', 0.1), 100);
        setTimeout(() => Sound.playTone(800, 'sine', 0.2), 200);
    }
};

// --- Entities ---

class Player {
    constructor() {
        this.x = 0;
        this.y = -100; // Height (negative is up)
        this.z = 0;
        this.width = 60;
        this.height = 30;
        this.velX = 0;
        this.velY = 0;
        this.tilt = 0; // Roll angle
        this.powerups = {}; // active powerups
    }

    update() {
        // Handling Speed
        const speedMultiplier = state.boosting ? 2 : 1;
        const accel = 1.5 * speedMultiplier;
        const friction = 0.92;
        const maxVel = 40;

        // Input Forces
        if (input.left) this.velX -= accel;
        if (input.right) this.velX += accel;
        if (input.up) this.velY -= accel;
        if (input.down) this.velY += accel;

        // Wind Effect
        this.velX += state.wind;

        // Friction
        this.velX *= friction;
        this.velY *= friction;

        // Clamp Velocity
        this.velX = Math.max(-maxVel, Math.min(maxVel, this.velX));
        this.velY = Math.max(-maxVel, Math.min(maxVel, this.velY));

        // Apply Position
        this.x += this.velX;
        this.y += this.velY;

        // Boundaries
        const boundX = CONFIG.roadWidth / 2 - 100;
        if (this.x < -boundX) { this.x = -boundX; this.velX = 0; }
        if (this.x > boundX) { this.x = boundX; this.velX = 0; }
        
        // Height Boundaries
        if (this.y < -500) { this.y = -500; this.velY = 0; }
        if (this.y > -20) { this.y = -20; this.velY = 0; } // Ground level check

        // Tilt Calculation
        this.tilt = this.velX * 1.5;

        // Trail Particles
        if (state.playing && !state.paused) {
            const color = state.boosting ? '#0ff' : '#fff';
            particles.push(new Particle(this.x - 20, this.y, this.z, color));
            particles.push(new Particle(this.x + 20, this.y, this.z, color));
        }

        // Powerup Timers
        for(let key in this.powerups) {
            if(this.powerups[key] > 0) {
                this.powerups[key]--;
                if(this.powerups[key] <= 0) delete this.powerups[key];
            }
        }
    }

    draw(ctx, centerX, centerY) {
        ctx.save();
        ctx.translate(centerX, centerY + this.y * (CONFIG.fov / CONFIG.fov)); // Simple projection for player
        
        // Shake effect
        ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
        
        ctx.rotate(this.tilt * Math.PI / 180);

        // Draw Jet
        // Body
        ctx.fillStyle = this.powerups['shield'] ? '#0f0' : '#ddd';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(15, 20);
        ctx.lineTo(0, 15);
        ctx.lineTo(-15, 20);
        ctx.fill();

        // Wings
        ctx.fillStyle = '#aaa';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(50, 20);
        ctx.lineTo(50, 30);
        ctx.lineTo(10, 20);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-50, 20);
        ctx.lineTo(-50, 30);
        ctx.lineTo(-10, 20);
        ctx.fill();

        // Cockpit
        ctx.fillStyle = '#0ff';
        ctx.fillRect(-3, 0, 6, 10);

        // Engine Glow
        if (input.boost || input.up) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f00';
            ctx.fillStyle = '#f90';
            ctx.beginPath();
            ctx.arc(0, 18, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        ctx.restore();
    }
}

class WorldObject {
    constructor(x, y, z) {
        this.x = x;
        this.y = y;
        this.z = z;
        this.active = true;
    }

    project(camX, camY, camZ) {
        const scale = CONFIG.fov / (CONFIG.fov + (this.z - camZ));
        const x2d = (this.x - camX) * scale + canvas.width / 2;
        const y2d = (this.y - camY) * scale + canvas.height / 2;
        return { x: x2d, y: y2d, scale: scale };
    }
}

class Building extends WorldObject {
    constructor(x, z, w, h, color) {
        super(x, -h/2, z); // Center Y anchor
        this.w = w;
        this.h = h;
        this.color = color;
        this.sideColor = adjustColor(color, -40);
        this.topColor = adjustColor(color, 40);
        
        // Random billboard?
        this.hasBillboard = Math.random() < 0.2;
        this.billboardColor = `hsl(${Math.random()*360}, 100%, 50%)`;
    }

    update(speed) {
        this.z -= speed;
        if (this.z < -CONFIG.fov) this.active = false;
        
        // Collision check (Simple 3D AABB)
        // Only check if close in Z
        if (Math.abs(this.z - player.z) < 50) {
            // Player width approx 40, height 20
            const pL = player.x - 25;
            const pR = player.x + 25;
            const pT = player.y - 10;
            const pB = player.y + 10;

            const bL = this.x - this.w/2;
            const bR = this.x + this.w/2;
            const bT = this.y - this.h/2; // Top of building (y is negative up)
            
            if (pB > this.y && pR > bL && pL < bR) {
                 if (!player.powerups['shield'] && !state.boosting) {
                     gameOver();
                 } else {
                     // Destroy building if shielded
                     this.active = false;
                     spawnExplosion(this.x, this.y, 20);
                     state.shake = 20;
                     Sound.crash();
                 }
            } else if (pB > this.y - 100 && pR > bL - 50 && pL < bR + 50) {
                // Near miss
                if(!this.missed) {
                    state.score += 50;
                    showPopup("NEAR MISS!", '#fff');
                    this.missed = true;
                }
            }
        }
    }

    draw(ctx) {
        if (this.z < 1) return; // Don't draw behind camera

        const p = this.project(0, 0, 0); // Camera is static 0,0,0 relative to world Z motion
        const w = this.w * p.scale;
        const h = this.h * p.scale;
        
        // Since Y is center, we need to extend to bottom of screen
        const groundY = (300 * p.scale) + canvas.height/2; 
        
        // Draw Front Face
        ctx.fillStyle = this.color;
        ctx.fillRect(p.x - w/2, p.y, w, groundY - p.y);
        
        // Draw Side Face (Pseudo 3D)
        // If building is to the right of center, we see left side
        const xDist = this.x; // relative to camera 0
        const sideScale = Math.abs(xDist) / 2000 * w; // Fake perspective factor
        
        ctx.fillStyle = this.sideColor;
        if (xDist > 0) {
            // Draw Left Side
            ctx.beginPath();
            ctx.moveTo(p.x - w/2, p.y);
            ctx.lineTo(p.x - w/2 - sideScale, p.y + 5);
            ctx.lineTo(p.x - w/2 - sideScale, groundY + 5);
            ctx.lineTo(p.x - w/2, groundY);
            ctx.fill();
        } else {
             // Draw Right Side
            ctx.beginPath();
            ctx.moveTo(p.x + w/2, p.y);
            ctx.lineTo(p.x + w/2 + sideScale, p.y + 5);
            ctx.lineTo(p.x + w/2 + sideScale, groundY + 5);
            ctx.lineTo(p.x + w/2, groundY);
            ctx.fill();
        }

        // Draw Top
        ctx.fillStyle = this.topColor;
        ctx.beginPath();
        ctx.moveTo(p.x - w/2, p.y);
        ctx.lineTo(p.x + w/2, p.y);
        ctx.lineTo(p.x + w/2 + (xDist > 0 ? sideScale : sideScale), p.y - 10 * p.scale);
        ctx.lineTo(p.x - w/2 - (xDist > 0 ? sideScale : sideScale), p.y - 10 * p.scale);
        ctx.fill();
        
        if(this.hasBillboard) {
            ctx.fillStyle = this.billboardColor;
            ctx.fillRect(p.x - w/4, p.y + 20*p.scale, w/2, w/2);
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${10*p.scale}px Arial`;
            ctx.fillText("ADS", p.x - w/8, p.y + 40*p.scale);
        }
    }
}

class Collectible extends WorldObject {
    constructor(x, y, z, type) {
        super(x, y, z);
        this.type = type; // 'coin', 'shield', 'magnet', 'slow'
        this.rot = Math.random() * Math.PI;
    }

    update(speed) {
        this.z -= speed;
        if (this.z < -CONFIG.fov) this.active = false;

        // Magnet Effect
        if (player.powerups['magnet'] && this.type === 'coin') {
            if (this.z < 800 && this.z > 0) {
                this.x += (player.x - this.x) * 0.1;
                this.y += (player.y - this.y) * 0.1;
            }
        }

        // Collision
        if (Math.abs(this.z - player.z) < 40) {
            const dist = Math.hypot(this.x - player.x, this.y - player.y);
            if (dist < 60) {
                this.collect();
            }
        }
        
        this.rot += 0.1;
    }

    collect() {
        this.active = false;
        if (this.type === 'coin') {
            state.coins++;
            state.score += 100 * (state.combo > 1 ? state.combo : 1);
            Sound.coin();
            // Combo Logic
            state.combo++;
            state.comboTimer = 100;
            showPopup(`+${100 * state.combo}`, '#ff0');
        } else {
            // Powerup
            player.powerups[this.type] = 600; // 10 seconds approx
            Sound.powerup();
            let name = this.type.toUpperCase();
            showPopup(`${name}!`, '#0ff');
        }
    }

    draw(ctx) {
        if (this.z < 1) return;
        const p = this.project(0, 0, 0);
        const s = p.scale;
        
        ctx.save();
        ctx.translate(p.x, p.y);
        
        if (this.type === 'coin') {
            ctx.scale(Math.cos(this.rot), 1);
            ctx.beginPath();
            ctx.arc(0, 0, 15 * s, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.strokeStyle = '#ff0';
            ctx.stroke();
        } else {
            // Powerup Box
            ctx.rotate(this.rot);
            ctx.fillStyle = this.type === 'shield' ? '#0f0' : (this.type === 'magnet' ? '#f0f' : '#00f');
            ctx.fillRect(-15*s, -15*s, 30*s, 30*s);
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${12*s}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.type[0].toUpperCase(), 0, 0);
        }
        
        ctx.restore();
    }
}

class Particle extends WorldObject {
    constructor(x, y, z, color) {
        super(x, y, z);
        this.color = color;
        this.life = 1.0;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
    }
    
    update(speed) {
        this.z -= speed;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.05;
        if (this.life <= 0 || this.z < -CONFIG.fov) this.active = false;
    }
    
    draw(ctx) {
        if (this.z < 1) return;
        const p = this.project(0, 0, 0);
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(p.x, p.y, 5*p.scale, 5*p.scale);
        ctx.globalAlpha = 1;
    }
}

// --- Globals ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const player = new Player();
let objects = [];
let particles = [];
let lastTime = 0;

// --- Helpers ---
function adjustColor(color, amount) {
    return '#' + color.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
}

function spawnRow(z) {
    const laneWidth = CONFIG.roadWidth / CONFIG.laneCount;
    
    if (Math.random() < 0.05) {
        state.wind = (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random());
        showPopup("WIND ZONE", '#aaf');
    } else if (Math.random() < 0.1) {
        state.wind = 0;
    }

    for (let i = 0; i < CONFIG.laneCount; i++) {
        if (Math.random() > 0.4) {
            const h = 200 + Math.random() * 400; 
            const x = (i - CONFIG.laneCount/2) * laneWidth + laneWidth/2;
            const color = Math.random() > 0.5 ? '#222' : '#333';
            objects.push(new Building(x, z, laneWidth * 0.8, h, color));
        } else {
            if (Math.random() < 0.3) {
                 const x = (i - CONFIG.laneCount/2) * laneWidth + laneWidth/2;
                 const y = -100 - Math.random() * 100;
                 let type = 'coin';
                 if (Math.random() < 0.05) type = ['shield', 'magnet', 'slow'][Math.floor(Math.random()*3)];
                 objects.push(new Collectible(x, y, z, type));
            }
        }
    }
}

function spawnExplosion(x, y, count) {
    for(let i=0; i<count; i++) {
        particles.push(new Particle(x, y, player.z + 100, '#ff5500'));
    }
}

function showPopup(text, color) {
    const el = document.createElement('div');
    el.className = 'popup';
    el.innerText = text;
    el.style.color = color;
    el.style.left = '50%';
    el.style.top = '40%';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

// --- Main Loop ---

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function resetGame() {
    state.playing = true;
    state.gameOver = false;
    state.score = 0;
    state.distance = 0;
    state.coins = 0;
    state.speed = CONFIG.baseSpeed;
    state.boostEnergy = 100;
    state.wind = 0;
    
    player.x = 0;
    player.y = -100;
    player.velX = 0;
    player.velY = 0;
    player.powerups = {};
    
    objects = [];
    particles = [];
    
    for (let z = 500; z < CONFIG.renderDist; z += CONFIG.segmentLength) {
        spawnRow(z);
    }
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    loop(0);
}

function startGame() {
    resetGame();
}

function gameOver() {
    state.gameOver = true;
    state.playing = false;
    Sound.crash();
    document.getElementById('finalScore').innerText = Math.floor(state.score);
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

function updateUI() {
    document.getElementById('scoreEl').innerText = Math.floor(state.score);
    document.getElementById('distEl').innerText = Math.floor(state.distance) + "m";
    document.getElementById('coinEl').innerText = state.coins;
    
    const boostBar = document.getElementById('boostBar');
    boostBar.style.width = state.boostEnergy + '%';
    if(state.boostEnergy >= 100) boostBar.classList.add('boost-ready');
    else boostBar.classList.remove('boost-ready');

    const puContainer = document.getElementById('powerupContainer');
    puContainer.innerHTML = '';
    for(let key in player.powerups) {
        const d = document.createElement('div');
        d.className = 'powerup-badge';
        d.innerHTML = `${key.toUpperCase()} ${(player.powerups[key]/60).toFixed(1)}s`;
        puContainer.appendChild(d);
    }
}

function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (state.playing && !state.paused) {
        state.gameTime += dt;
        state.dayCycle = (Math.sin(state.gameTime * 0.0001) + 1) / 2;

        let target = CONFIG.baseSpeed + (state.distance * 0.001);
        if (target > CONFIG.maxSpeed) target = CONFIG.maxSpeed;
        if (player.powerups['slow']) target *= 0.5;
        
        if (input.boost && state.boostEnergy > 0) {
            state.boosting = true;
            state.targetSpeed = CONFIG.boostSpeed;
            state.boostEnergy -= 0.5;
            state.shake = 5;
            if (Math.random() < 0.1) Sound.boost(); 
        } else {
            state.boosting = false;
            state.targetSpeed = target;
            if (state.boostEnergy < 100) state.boostEnergy += 0.1;
            state.shake = Math.max(0, state.shake - 1);
        }
        
        state.speed += (state.targetSpeed - state.speed) * 0.1;
        state.distance += state.speed * 0.01;
        state.score += state.speed * 0.1;
        
        if (state.combo > 0) {
            state.comboTimer--;
            if (state.comboTimer <= 0) state.combo = 0;
        }

        player.update();
        
        const furthestZ = objects.length > 0 ? objects[objects.length-1].z : 0;
        if (furthestZ < CONFIG.renderDist) {
            spawnRow(furthestZ + CONFIG.segmentLength);
        }
        
        objects.forEach(o => o.update(state.speed));
        particles.forEach(p => p.update(state.speed));
        
        objects = objects.filter(o => o.active);
        particles = particles.filter(p => p.active);
        
        objects.sort((a, b) => b.z - a.z);
    }

    const cyc = state.dayCycle;
    const skyTop = interpolateColor(CONFIG.colors.skyNight[0], CONFIG.colors.skyDay[0], cyc);
    const skyBot = interpolateColor(CONFIG.colors.skyNight[1], CONFIG.colors.skyDay[1], cyc);
    
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, skyTop);
    grad.addColorStop(1, skyBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    objects.forEach(o => o.draw(ctx));
    particles.forEach(p => p.draw(ctx));
    player.draw(ctx, canvas.width/2, canvas.height/2);

    updateUI();
    if (!state.gameOver) requestAnimationFrame(loop);
}

function interpolateColor(c1, c2, factor) {
    const r1 = parseInt(c1.substring(1,3), 16), g1 = parseInt(c1.substring(3,5), 16), b1 = parseInt(c1.substring(5,7), 16);
    const r2 = parseInt(c2.substring(1,3), 16), g2 = parseInt(c2.substring(3,5), 16), b2 = parseInt(c2.substring(5,7), 16);
    const r = Math.round(r1 + factor * (r2 - r1));
    const g = Math.round(g1 + factor * (g2 - g1));
    const b = Math.round(b1 + factor * (b2 - b1));
    return `rgb(${r},${g},${b})`;
}
